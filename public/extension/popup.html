<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="popup.css">

</head>

<body>

  <div class="header">
    <div class="header-title">🔔 التذكير الصوتي</div>
  </div>

  <div class="body">

    <!-- volume -->
    <div class="vol-wrap">
      <div class="row-label">مستوى الصوت</div>
      <div class="vol-row">
        <span class="vol-icon" id="volIcon">🔊</span>
        <input type="range" id="vol" min="0" max="1" step="0.1" value="1">
      </div>
    </div>

    <!-- audio format -->
    <div class="select-wrap">
      <div class="row-label">صيغة التذكير</div>
      <select id="audioSelect"></select>
    </div>

    <!-- timer -->
    <div class="select-wrap">
      <div class="row-label">تنبيه كل</div>
      <select id="timer">
        <option value="0">إيقاف</option>
        <option value="300000">5 دقائق</option>
        <option value="600000">10 دقائق</option>
        <option value="1800000">٣٠ دقيقة</option>
        <option value="3600000">ساعة</option>
        <option value="7200000">ساعتين</option>
        <option value="custom">موعد مخصص...</option>
      </select>
    </div>

    <!-- custom timer input -->
    <div id="customTimerWrap" class="select-wrap" style="display: none;">
      <div class="row-label">دقائق مخصصة</div>
      <div class="custom-input-row">
        <input type="number" id="customMinutes" min="1" placeholder="مثلاً: 7">
        <span class="input-unit">دقيقة</span>
      </div>
    </div>

    <!-- new tab -->
    <label class="check-wrap">
      <input type="checkbox" id="playNewTab">
      <span class="custom-check"></span>
      <span class="check-label">صوت عند فتح تبويب جديد</span>
    </label>

  </div>

  <div class="footer"></div>

  <script type="module" src="popup.js"></script>
</body>

</html>
